<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Pace Runner</title>
<style>
  :root {
    --bg: #0b0f14;
    --bg-alt: #10161d;
    --text: #eef2f6;
    --muted: #9aa7b5;
    --accent: #39ff9d;
    --accent-dim: #1f6e4c;
    --card: #131a22;
    --border: #22303c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  a { color: inherit; }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 6vw;
    background: rgba(11, 15, 20, 0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }
  nav a {
    text-decoration: none;
    color: var(--muted);
    margin-left: 2rem;
    font-size: 0.95rem;
    transition: color 0.2s;
  }
  nav a:hover, nav a.active { color: var(--text); }
  nav a.active { color: var(--accent); }

  .login-wrap {
    min-height: calc(100vh - 74px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 6vw;
    background: radial-gradient(ellipse at top, #10201a 0%, var(--bg) 60%);
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
  }
  .login-card h1 {
    font-size: 1.6rem;
    margin: 0 0 0.4rem;
    letter-spacing: -0.02em;
  }
  .login-card p.sub {
    color: var(--muted);
    font-size: 0.95rem;
    margin: 0 0 2rem;
  }

  .field { margin-bottom: 1.2rem; }
  .field label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .field input {
    width: 100%;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
  }
  .field input:focus { outline: 2px solid var(--accent-dim); }

  .row-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .row-between label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--muted);
  }
  .row-between a { color: var(--accent); text-decoration: none; }

  .btn {
    width: 100%;
    padding: 0.9rem 1.8rem;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.98rem;
    text-decoration: none;
    display: inline-block;
    text-align: center;
    border: none;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-primary {
    background: var(--accent);
    color: #06120c;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin: 1.5rem 0;
    color: var(--muted);
    font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .signup-note {
    text-align: center;
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 1.5rem;
  }
  .signup-note a { color: var(--accent); text-decoration: none; }

  .form-note {
    font-size: 0.85rem;
    margin-top: 1rem;
    text-align: center;
    min-height: 1.2rem;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Pace<span>Runner</span></div>
  <nav>
    <a href="index.html">Home</a>
    <a href="features.html">Features</a>
    <a href="login.html" class="active">Log In</a>
  </nav>
</header>

<div class="login-wrap">
  <div class="login-card">
    <h1>Welcome back</h1>
    <p class="sub">Log in to see your form, pace, and crew stats.</p>

    <form id="login-form" onsubmit="return handleLogin(event)">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••" />
      </div>
      <div class="row-between">
        <label><input type="checkbox" /> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary">Log In</button>
      <p class="form-note" id="login-note"></p>
    </form>

    <div class="divider">or</div>

    <p class="signup-note">Don't have an account? <a href="index.html#join">Get early access</a></p>
  </div>
</div>

<script>
  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const note = document.getElementById('login-note');
    note.style.color = 'var(--accent)';
    note.textContent = "Logged in as " + email + " (demo only — no backend yet).";
    return false;
  }
</script>

</body>
</html>
