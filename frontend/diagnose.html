<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Photo Diagnosis — AgriSage</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#3f7d20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AgriSage">
</head>
<body class="m-0 p-0 bg-page text-ink font-sans">

<div class="max-w-[430px] mx-auto min-h-screen bg-app flex flex-col shadow-[0_0_40px_rgba(0,0,0,0.06)]">
  <header class="sticky top-0 z-20 bg-app/95 backdrop-blur-[10px] border-b border-border">
    <div class="flex items-center justify-between px-[1.3rem] pt-[1.1rem] pb-[0.6rem]">
      <div class="flex items-center gap-2 font-extrabold text-[1.15rem] tracking-[-0.02em]">
        <div class="w-8 h-8 rounded-[9px] bg-accent flex items-center justify-center text-[1.05rem]">🌿</div>
        Agri<span class="text-accent">Sage</span>
      </div>
      <div class="icon-btn">🔔</div>
    </div>
    <nav class="flex px-[0.6rem] pb-[0.4rem]">
      <a href="dashboard.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-muted py-[0.3rem]"><span class="text-[1.15rem]">🏠</span>Home</a>
      <a href="crop-select.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-accent-dark font-bold py-[0.3rem]"><span class="text-[1.15rem]">📷</span>Diagnose</a>
      <a href="history.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-muted py-[0.3rem]"><span class="text-[1.15rem]">📋</span>History</a>
      <a href="mypage.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-muted py-[0.3rem]"><span class="text-[1.15rem]">👤</span>Profile</a>
    </nav>
    <div class="flex items-center gap-[0.8rem] px-[1.3rem] pb-[0.6rem]">
      <a class="back-btn" href="crop-select.html">←</a>
      <h1 class="m-0 text-[1.1rem] tracking-[-0.01em]">Photo Diagnosis</h1>
    </div>
  </header>

  <main class="flex-1 px-[1.3rem] pt-[0.3rem] pb-[2.5rem]">
    <div class="inline-flex items-center gap-2 text-white pl-2 pr-[0.9rem] py-2 rounded-full text-[0.85rem] font-bold mt-[0.3rem] mb-[1.2rem]" id="cropChip"></div>

    <label class="border-2 border-dashed border-border rounded-[20px] bg-card min-h-[220px] flex flex-col items-center justify-center gap-[0.6rem] text-center p-6 cursor-pointer overflow-hidden relative block" id="uploadBox">
      <input type="file" class="hidden" id="fileInput" accept="image/*" capture="environment">
      <div class="text-[2rem]">📷</div>
      <h3 class="m-0 text-[0.95rem]">Upload a leaf photo</h3>
      <p class="m-0 text-[0.78rem] text-muted">Tap to take a photo or choose one from your gallery</p>
    </label>

    <div class="flex gap-[0.6rem] bg-card border border-border rounded-2xl px-4 py-[0.8rem] mt-[0.8rem]">
      <div class="text-[1.05rem]">💡</div>
      <div class="text-[0.76rem] text-muted leading-relaxed">
        <b class="text-ink">Tips for a clearer diagnosis:</b> shoot in natural daylight, avoid harsh shadows or glare, fill the frame with the whole leaf, and hold the camera steady and close to the affected spot.
      </div>
    </div>

    <button class="primary-btn mt-[1.1rem]" id="diagnoseBtn" disabled>Run AI Diagnosis</button>

    <div class="spinner" id="spinner">
      <div class="w-2 h-2 rounded-full bg-accent animate-dot-pulse"></div>
      <div class="w-2 h-2 rounded-full bg-accent animate-dot-pulse" style="animation-delay:.15s"></div>
      <div class="w-2 h-2 rounded-full bg-accent animate-dot-pulse" style="animation-delay:.3s"></div>
      <span>Diagnosing...</span>
    </div>
  </main>
</div>

<script src="js/store.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const cropId = params.get("cropId");
  const crop = params.get("crop") || "Crop";
  const color = params.get("color") || "#3f7d20";
  const emoji = params.get("emoji") || "🌱";

  const chip = document.getElementById("cropChip");
  chip.style.background = color;
  chip.innerHTML = `<span class="w-[1.8rem] h-[1.8rem] rounded-full bg-white/30 flex items-center justify-center text-base">${emoji}</span> Diagnosing ${crop}`;

  const fileInput = document.getElementById("fileInput");
  const uploadBox = document.getElementById("uploadBox");
  const diagnoseBtn = document.getElementById("diagnoseBtn");
  const spinner = document.getElementById("spinner");
  let uploadedImage = null;

  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedImage = e.target.result;
      uploadBox.innerHTML = `<img src="${uploadedImage}" alt="Uploaded photo" class="w-full h-[220px] object-cover rounded-[14px]">`;
      diagnoseBtn.disabled = false;
      diagnoseBtn.classList.add("ready");
    };
    reader.readAsDataURL(file);
  });

  diagnoseBtn.addEventListener("click", () => {
    if (!uploadedImage) return;
    spinner.classList.add("show");
    diagnoseBtn.disabled = true;
    setTimeout(() => {
      const result = mockDiagnose();
      const registeredCrop = getCrops().find((c) => c.id === cropId) || null;
      sessionStorage.setItem("agrisage_pending_diagnosis", JSON.stringify({
        cropId, cropName: crop, color, emoji, image: uploadedImage, result, crop: registeredCrop,
      }));
      window.location.href = "diagnosis-result.html";
    }, 1200);
  });
</script>

<script src="js/pwa.js"></script>
</body>
</html>
