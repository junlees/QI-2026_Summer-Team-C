<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Log In — AgriSage</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#3f7d20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AgriSage">
</head>
<body class="m-0 p-0 bg-page text-ink font-sans min-[431px]:py-8">

<div class="w-full max-w-[430px] md:max-w-xl mx-auto min-h-screen bg-app flex flex-col relative shadow-sm md:shadow-2xl md:rounded-[32px] md:my-8 md:border md:border-border/60 transition-all">

  <div class="px-[1.3rem] pt-[1.1rem]">
    <a class="back-btn" href="landing.html">←</a>
  </div>

  <main class="flex-1 flex flex-col justify-center px-[1.6rem] py-[1rem]">
    <div class="flex items-center justify-center gap-2 mb-[2.2rem]">
      <div class="w-10 h-10 rounded-[10px] bg-accent flex items-center justify-center text-[1.3rem]">🌿</div>
      <span class="font-extrabold text-[1.4rem] tracking-[-0.02em]">Agri<span class="text-accent">Sage</span></span>
    </div>

    <h1 class="m-0 mb-[0.4rem] text-[1.3rem] tracking-[-0.02em] text-center">Welcome back</h1>
    <p class="m-0 mb-[1.8rem] text-muted text-[0.88rem] text-center leading-relaxed">Log in to diagnose your crops and pick up where you left off.</p>

    <form id="loginForm" class="flex flex-col gap-[0.9rem]">
      <label class="flex flex-col gap-[0.35rem]">
        <span class="text-[0.78rem] font-bold text-muted">Email</span>
        <input type="email" required placeholder="you@example.com"
          class="w-full border border-border rounded-2xl px-4 py-[0.85rem] text-[0.92rem] bg-card text-ink outline-none focus:border-accent">
      </label>
      <label class="flex flex-col gap-[0.35rem]">
        <span class="text-[0.78rem] font-bold text-muted">Password</span>
        <input type="password" required placeholder="••••••••"
          class="w-full border border-border rounded-2xl px-4 py-[0.85rem] text-[0.92rem] bg-card text-ink outline-none focus:border-accent">
      </label>

      <button type="submit" class="w-full border-none rounded-2xl py-[0.95rem] text-[0.95rem] font-bold bg-accent text-white cursor-pointer mt-[0.4rem]">
        Log in
      </button>
    </form>

    <p class="text-center mt-[1.3rem] text-[0.82rem] text-muted">
      New to AgriSage? <a href="signup.html" class="text-accent-dark font-bold">Sign up</a>
    </p>
    <a href="index.html" class="block text-center mt-[0.6rem] text-[0.82rem] text-muted">
      Continue as guest →
    </a>
  </main>

  <div class="px-[1.6rem] pb-[2rem]">
    <p class="m-0 text-center text-[0.72rem] text-muted">
      This is a prototype — no account or password is actually checked yet.
    </p>
  </div>

</div>

<script src="js/store.js"></script>
<script>
  document.getElementById("loginForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const email = e.target.querySelector('input[type="email"]').value;
    // No real auth yet — reuse the stored profile if one exists (e.g. from
    // signup.html), otherwise create a minimal placeholder so dashboard.html
    // and mypage.html have something to read.
    if (!getProfile()) {
      saveProfile({ email, certification: "conventional", purpose: "self_consumption" });
    }
    window.location.href = "dashboard.html";
  });
</script>

<script src="js/pwa.js"></script>
</body>
</html>
