<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard — AgriSage</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#3f7d20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AgriSage">
</head>
<body class="m-0 p-0 bg-page text-ink font-sans min-[431px]:py-8">

<div class="max-w-[430px] mx-auto min-h-screen bg-app flex flex-col relative shadow-[0_0_40px_rgba(0,0,0,0.06)]">

  <header class="sticky top-0 z-20 bg-app border-b border-border">
    <div class="flex items-center justify-between px-[1.3rem] pt-[1.1rem] pb-[0.6rem]">
      <div class="flex items-center gap-2 font-extrabold text-[1.15rem] tracking-[-0.02em]">
        <div class="w-8 h-8 rounded-[9px] bg-accent flex items-center justify-center text-[1.05rem]">🌿</div>
        Agri<span class="text-accent">Sage</span>
      </div>
    </div>
    <nav class="flex px-[0.6rem] pb-[0.4rem]">
      <a href="dashboard.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-accent-dark font-bold py-[0.3rem]"><span class="text-[1.15rem]">🏠</span>Home</a>
      <a href="crop-select.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-muted py-[0.3rem]"><span class="text-[1.15rem]">📷</span>Diagnose</a>
      <a href="history.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-muted py-[0.3rem]"><span class="text-[1.15rem]">📋</span>History</a>
      <a href="mypage.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-muted py-[0.3rem]"><span class="text-[1.15rem]">👤</span>Profile</a>
    </nav>
  </header>

  <main class="flex-1 px-[1.3rem] pt-[0.4rem] pb-[2.5rem]">
    <div class="py-[0.6rem] pb-[1rem]">
      <h1 class="text-2xl leading-[1.35] m-0 mb-[0.3rem] tracking-[-0.02em]" id="greeting">Hello 🌱</h1>
      <p class="m-0 text-muted text-[0.92rem] leading-relaxed">Here's what's growing right now.</p>
    </div>

    <a href="follow-up.html" class="hidden mb-[1rem]" id="followUpBanner">
      <div class="flex items-center gap-[0.7rem] bg-caution-soft border border-[#eddca0] rounded-2xl px-4 py-[0.9rem]">
        <div class="text-[1.2rem]">🔔</div>
        <div class="flex-1">
          <div class="text-[0.85rem] font-bold text-ink">Follow-up check pending</div>
          <div class="text-[0.74rem] text-muted" id="followUpSubtext">See how your last treatment is going</div>
        </div>
        <div class="text-muted">→</div>
      </div>
    </a>

    <a href="crop-select.html" id="diagnoseCta" class="block">
      <div class="rounded-[22px] p-[1.5rem_1.4rem] flex items-center gap-4 text-white shadow-[0_12px_24px_rgba(44,92,20,0.28)] bg-gradient-to-br from-accent to-accent-dark">
        <div class="w-[3.2rem] h-[3.2rem] rounded-2xl bg-white/[0.16] flex items-center justify-center text-[1.6rem] shrink-0">📷</div>
        <div>
          <h2 class="m-0 mb-[0.3rem] text-[1.05rem] tracking-[-0.01em]" id="diagnoseCtaTitle">Diagnose a crop</h2>
          <p class="m-0 mb-[0.7rem] text-[0.82rem] opacity-90 leading-snug" id="diagnoseCtaSubtitle">Register your first crop to get started</p>
          <span class="inline-flex items-center gap-1 bg-white text-accent-dark font-bold text-[0.82rem] px-[0.9rem] py-[0.5rem] rounded-full">Diagnose →</span>
        </div>
      </div>
    </a>

    <div class="flex items-baseline justify-between mt-[1.8rem] mb-[0.8rem]">
      <h3 class="m-0 text-base tracking-[-0.01em]">Your crops</h3>
      <a href="crop-select.html" class="text-accent-dark text-[0.78rem] font-bold">+ Add crop</a>
    </div>
    <div class="flex flex-col gap-[0.6rem]" id="cropList"></div>
    <p class="m-0 text-muted text-[0.82rem]" id="emptyCrops">No crops registered yet. <a href="crop-select.html" class="text-accent-dark font-bold">Register one →</a></p>
  </main>

</div>

<script src="js/store.js"></script>
<script>
  const profile = getProfile();
  const greeting = document.getElementById("greeting");
  if (profile && profile.email) {
    greeting.textContent = `Hello, ${profile.email.split("@")[0]} 🌱`;
  }

  const crops = getCrops();
  const cropList = document.getElementById("cropList");
  const emptyCrops = document.getElementById("emptyCrops");
  const diagnoseCta = document.getElementById("diagnoseCta");
  const diagnoseCtaTitle = document.getElementById("diagnoseCtaTitle");
  const diagnoseCtaSubtitle = document.getElementById("diagnoseCtaSubtitle");

  function purposeLabel(crop) {
    const purpose = resolvePurpose(crop, profile);
    return purpose === "sale" ? "Sale" : "Self-consumption";
  }

  if (crops.length) {
    emptyCrops.classList.add("hidden");
    cropList.innerHTML = crops.map((crop) => `
      <div class="flex items-center gap-[0.8rem] bg-card border border-border rounded-2xl px-4 py-[0.75rem]">
        <div class="w-[2.2rem] h-[2.2rem] rounded-full flex items-center justify-center text-[1.2rem] shrink-0" style="background:${crop.color}">${crop.emoji}</div>
        <div class="flex-1 min-w-0">
          <div class="text-[0.9rem] font-bold">${crop.name}</div>
          <div class="text-[0.72rem] text-muted">${crop.growingEnvironment === "greenhouse" ? "Greenhouse" : "Open field"} · ${purposeLabel(crop)} · Harvest ${crop.harvestDate}</div>
        </div>
        <a href="diagnose.html?cropId=${crop.id}&crop=${encodeURIComponent(crop.name)}&color=${encodeURIComponent(crop.color)}&emoji=${encodeURIComponent(crop.emoji)}" class="text-[0.76rem] font-bold text-accent-dark shrink-0">Diagnose →</a>
      </div>
    `).join("");

    const latest = crops[crops.length - 1];
    diagnoseCtaTitle.textContent = `Diagnose your ${latest.name}`;
    diagnoseCtaSubtitle.textContent = "Take a photo of the leaf to get started";
    diagnoseCta.href = `diagnose.html?cropId=${latest.id}&crop=${encodeURIComponent(latest.name)}&color=${encodeURIComponent(latest.color)}&emoji=${encodeURIComponent(latest.emoji)}`;
  }

  const history = getHistory();
  const pending = history.find((h) => !h.followUpStatus);
  if (pending) {
    const banner = document.getElementById("followUpBanner");
    document.getElementById("followUpSubtext").textContent = `See how your ${pending.cropName} treatment is going`;
    banner.href = `follow-up.html?id=${pending.id}`;
    banner.classList.remove("hidden");
  }
</script>

<script src="js/pwa.js"></script>
</body>
</html>
