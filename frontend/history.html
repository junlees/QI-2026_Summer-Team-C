<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Diagnosis History — AgriSage</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#3f7d20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AgriSage">
</head>
<body class="m-0 p-0 bg-page text-ink font-sans">

<div class="w-full max-w-[430px] md:max-w-3xl lg:max-w-5xl mx-auto min-h-screen bg-app flex flex-col relative shadow-sm md:shadow-2xl md:rounded-[32px] md:my-6 md:border md:border-border/60 transition-all">
  <header class="sticky top-0 z-20 bg-app/95 backdrop-blur-md border-b border-border md:rounded-t-[32px]">
    <div class="flex items-center justify-between px-4 md:px-8 pt-4 pb-2">
      <div class="flex items-center gap-2.5 font-extrabold text-[1.2rem] tracking-tight">
        <div class="w-9 h-9 rounded-xl bg-accent flex items-center justify-center text-[1.1rem] text-white shadow-xs">🌿</div>
        <span>Agri<span class="text-accent">Sage</span></span>
      </div>
      <!-- Desktop Navigation Link Badges -->
      <div class="hidden md:flex items-center gap-1.5 bg-card border border-border/80 rounded-2xl p-1 shadow-xs">
        <a href="dashboard.html" class="px-3.5 py-1.5 rounded-xl text-[0.82rem] font-bold text-muted hover:text-ink hover:bg-app transition-all">🏠 Home</a>
        <a href="crop-select.html" class="px-3.5 py-1.5 rounded-xl text-[0.82rem] font-bold text-muted hover:text-ink hover:bg-app transition-all">📷 Diagnose</a>
        <a href="history.html" class="px-3.5 py-1.5 rounded-xl text-[0.82rem] font-extrabold text-accent-dark bg-accent-soft transition-all">📋 History</a>
        <a href="mypage.html" class="px-3.5 py-1.5 rounded-xl text-[0.82rem] font-bold text-muted hover:text-ink hover:bg-app transition-all">👤 Profile</a>
      </div>
    </div>
    <!-- Mobile Navigation Tabs -->
    <nav class="flex md:hidden px-[0.6rem] pb-[0.4rem]">
      <a href="dashboard.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-muted py-[0.3rem]"><span class="text-[1.15rem]">🏠</span>Home</a>
      <a href="crop-select.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-muted py-[0.3rem]"><span class="text-[1.15rem]">📷</span>Diagnose</a>
      <a href="history.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-accent-dark font-bold py-[0.3rem]"><span class="text-[1.15rem]">📋</span>History</a>
      <a href="mypage.html" class="flex-1 flex flex-col items-center gap-[0.15rem] text-[0.68rem] text-muted py-[0.3rem]"><span class="text-[1.15rem]">👤</span>Profile</a>
    </nav>
    <div class="flex items-center gap-3 px-4 md:px-8 pb-3 pt-1">
      <a class="back-btn hover:border-accent transition-colors" href="dashboard.html">←</a>
      <div>
        <h1 class="m-0 text-[1.15rem] md:text-xl font-extrabold tracking-tight">Diagnosis History</h1>
        <p class="m-0 text-[0.78rem] text-muted font-medium hidden md:block">Review past diagnostic logs and treatment follow-up records</p>
      </div>
    </div>
  </header>

  <main class="flex-1 px-4 md:px-8 pt-4 pb-12">
    <p class="m-0 mb-4 text-muted text-[0.88rem] leading-relaxed">Tap a record to view its full diagnosis again.</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-3.5" id="historyList"></div>
    <p class="hidden m-0 text-muted text-[0.85rem] font-medium" id="emptyState">No diagnoses yet.</p>
  </main>
</div>

<script src="js/store.js"></script>
<script>
  const list = document.getElementById("historyList");
  const history = getHistory();

  if (!history.length) {
    document.getElementById("emptyState").classList.remove("hidden");
  }

  const statusBadge = (entry) => {
    if (entry.followUpStatus === "resolved") return `<span class="text-[0.68rem] font-bold text-accent-dark">✓ Resolved</span>`;
    if (entry.followUpStatus === "escalate") return `<span class="text-[0.68rem] font-bold text-danger">⚠ Needs expert</span>`;
    return `<span class="text-[0.68rem] font-bold text-muted">Follow-up pending</span>`;
  };

  list.innerHTML = history.map((entry) => `
    <button type="button" class="history-item text-left flex items-center gap-[0.8rem] bg-card border border-border rounded-2xl px-4 py-[0.85rem] cursor-pointer" data-id="${entry.id}">
      <div class="w-[2.4rem] h-[2.4rem] rounded-full flex items-center justify-center text-[1.3rem] shrink-0" style="background:${entry.color}">${entry.emoji}</div>
      <div class="flex-1 min-w-0">
        <div class="text-[0.9rem] font-bold">${entry.cropName} · ${entry.disease}</div>
        <div class="text-[0.72rem] text-muted">${entry.date} · Confidence ${entry.confidence}%</div>
      </div>
      ${statusBadge(entry)}
    </button>
  `).join("");

  list.querySelectorAll(".history-item").forEach((btn) => {
    btn.addEventListener("click", () => {
      const entry = findHistoryEntry(btn.dataset.id);
      if (!entry) return;
      sessionStorage.setItem("agrisage_pending_diagnosis", JSON.stringify({
        viewOnly: true,
        historyId: entry.id,
        cropName: entry.cropName,
        color: entry.color,
        emoji: entry.emoji,
        crop: null,
        result: {
          name: entry.disease,
          confidence: entry.confidence,
          severity: "low",
          symptoms: "This is a historical record — full symptom detail isn't stored in this prototype.",
          cause: "This is a historical record — full cause detail isn't stored in this prototype.",
          recommendations: [],
          excluded: [],
        },
      }));
      window.location.href = "diagnosis-result.html";
    });
  });
</script>

<script src="js/pwa.js"></script>
</body>
</html>
